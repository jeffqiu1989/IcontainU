# Envoy redis_proxy filter in front of a 3-master / 3-replica Redis Cluster.
#
# Same config as redis-cluster-proxy/envoy.yaml; the only difference is the
# set of seed endpoints (6 nodes instead of 3).
#
# enable_redirection makes Envoy follow MOVED/ASK internally so the downstream
# client treats Envoy as a single non-cluster Redis endpoint.

static_resources:
  listeners:
    - name: redis_listener
      address:
        socket_address:
          address: 0.0.0.0
          port_value: 6379
      filter_chains:
        - filters:
            - name: envoy.filters.network.redis_proxy
              typed_config:
                "@type": type.googleapis.com/envoy.extensions.filters.network.redis_proxy.v3.RedisProxy
                stat_prefix: redis
                prefix_routes:
                  catch_all_route:
                    cluster: redis_cluster
                settings:
                  op_timeout: 5s
                  enable_redirection: true

  clusters:
    - name: redis_cluster
      connect_timeout: 1s
      lb_policy: CLUSTER_PROVIDED
      cluster_type:
        name: envoy.clusters.redis
        typed_config:
          "@type": type.googleapis.com/google.protobuf.Struct
      load_assignment:
        cluster_name: redis_cluster
        endpoints:
          - lb_endpoints:
              # Master seed nodes
              - endpoint:
                  address:
                    socket_address:
                      address: redis-m-0
                      port_value: 6379
              - endpoint:
                  address:
                    socket_address:
                      address: redis-m-1
                      port_value: 6379
              - endpoint:
                  address:
                    socket_address:
                      address: redis-m-2
                      port_value: 6379
              # Replica seed nodes (Envoy discovers they are replicas and
              # routes read-only commands there; writes still go to masters)
              - endpoint:
                  address:
                    socket_address:
                      address: redis-r-0
                      port_value: 6379
              - endpoint:
                  address:
                    socket_address:
                      address: redis-r-1
                      port_value: 6379
              - endpoint:
                  address:
                    socket_address:
                      address: redis-r-2
                      port_value: 6379